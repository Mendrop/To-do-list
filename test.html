<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Node.js Learning Tracker</title>
  <style>
    body { font-family: Arial; background:#0f172a; color:#e2e8f0; padding:20px }
    h1 { text-align:center }
    .topic { background:#1e293b; padding:10px; margin:8px 0; border-radius:10px }
    .done { text-decoration: line-through; opacity:0.6 }
    button { margin-top:20px; padding:10px; border:none; border-radius:8px; cursor:pointer }
  </style>
</head>
<body>
  <h1>🚀 Node.js Learning Tracker</h1>
  <div id="list"></div>
  <button onclick="resetProgress()">Reset Progress</button>

<script>
const topics = [
  { title: "Node.js Basics", desc: "What Node is, runtime, event loop" },
  { title: "Modules (CommonJS & ES Modules)", desc: "require, import/export" },
  { title: "File System (fs)", desc: "Read/write files, streams" },
  { title: "Path Module", desc: "Handle file paths safely" },
  { title: "HTTP Module", desc: "Create basic server" },
  { title: "NPM & Packages", desc: "Install & manage dependencies" },
  { title: "Async JS", desc: "Callbacks, Promises, async/await" },
  { title: "Express.js", desc: "Build APIs easily" },
  { title: "Routing & Middleware", desc: "Request handling layers" },
  { title: "REST APIs", desc: "CRUD operations" },
  { title: "MongoDB + Mongoose", desc: "Database integration" },
  { title: "Authentication", desc: "JWT, bcrypt" },
  { title: "Error Handling", desc: "Proper error flow" },
  { title: "Environment Variables", desc: "Using dotenv" },
  { title: "Security", desc: "Helmet, validation, rate limit" },
  { title: "Testing", desc: "Jest / Supertest basics" },
  { title: "Deployment", desc: "Deploy apps (Vercel, VPS)" }
];

const list = document.getElementById("list");
const saved = JSON.parse(localStorage.getItem("progress") || "[]");

function render(){
  list.innerHTML = "";
  topics.forEach((t,i)=>{
    const div = document.createElement("div");
    div.className = "topic";
    const checked = saved.includes(i);
    div.innerHTML = `
      <input type="checkbox" ${checked ? "checked" : ""} onchange="toggle(${i})" />
      <span class="${checked ? 'done':''}"><b>${t.title}</b> - ${t.desc}</span>
    `;
    list.appendChild(div);
  });
}

function toggle(i){
  if(saved.includes(i)){
    saved.splice(saved.indexOf(i),1);
  } else {
    saved.push(i);
  }
  localStorage.setItem("progress", JSON.stringify(saved));
  render();
}

function resetProgress(){
  localStorage.removeItem("progress");
  location.reload();
}

render();
</script>
</body>
</html>
